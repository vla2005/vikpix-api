spring.datasource.url=jdbc:h2:mem:vikpix-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/vikpix
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/realms/vikpix/protocol/openid-connect/certs
keycloak.auth-server-url=http://localhost:8081
keycloak.public-auth-server-url=http://localhost:8081
keycloak.realm=vikpix
keycloak.admin-client-id=vikpix-api
keycloak.admin-client-secret=test-secret

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test
app.mail.from-email=no-reply@test.local
app.mail.from-name=VikPix

app.frontend-url=http://localhost:5173
app.backend-url=http://localhost:8080

spring.application.name=vikpix-api
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vikpix}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:vikpix}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:vikpix}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false

server.error.include-stacktrace=never
server.error.include-message=always

bezkoder.app.jwtSecret=${JWT_SECRET:bGF3ZWFyLWFwaS1qd3Qtc2VjcmV0LWtlWS1mb3ItaHMyNTYtMzItYnl0ZXM=}
bezkoder.app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}
